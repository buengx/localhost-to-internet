<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Proxy Tunnel Initializer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #container { max-width: 500px; text-align: center; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #007bff; }
        #status { font-weight: bold; padding: 10px; margin-top: 20px; border-radius: 4px; }
        .success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Proxy Tunnel</h1>
        <div id="status">Initializing...</div>
        <p>This page installs the proxy service worker. Once installed, you can browse to any page on this site, and requests will be tunneled.</p>
    </div>

    <script>
        const statusDiv = document.getElementById('status');

        window.addEventListener('load', async () => {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
                    statusDiv.textContent = 'Proxy service active! You can now navigate to your proxied content.';
                    statusDiv.className = 'success';
                    console.log('Service Worker registered successfully:', registration);
                } catch (error) {
                    statusDiv.textContent = 'Error: Service Worker registration failed.';
                    statusDiv.className = 'error';
                    console.error('Service Worker registration failed:', error);
                }
            } else {
                statusDiv.textContent = 'Error: Service Workers are not supported by this browser.';
                statusDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
